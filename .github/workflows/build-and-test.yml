name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer
      SPM_PACKAGES: .spm-packages
    steps:
      - uses: actions/checkout@v4

      - name: Show build environment
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: ${{ env.SPM_PACKAGES }}
          key: spm-${{ hashFiles('wispr.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: spm-

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project wispr.xcodeproj \
            -scheme wispr \
            -configuration Debug \
            -destination 'generic/platform=macOS' \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcbeautify

      - name: Run unit tests
        if: false
        timeout-minutes: 5
        run: |
          set -o pipefail
          xcodebuild test \
            -project wispr.xcodeproj \
            -scheme wispr \
            -destination 'platform=macOS,arch=arm64' \
            -only-testing:wisprTests \
            -clonedSourcePackagesDirPath "$SPM_PACKAGES" \
            CODE_SIGN_IDENTITY=- \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO | xcbeautify
